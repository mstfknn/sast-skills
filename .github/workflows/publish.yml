name: publish

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint:md

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      # OIDC trusted publishing needs npm >= 11.5.1; Node 20 ships npm 10.
      - run: npm install -g npm@latest
      - run: npm ci
      # No auth token: credentials come from the GitHub OIDC identity via the
      # npm trusted publisher configured for this repo + workflow.
      - run: npm publish --provenance --access public
